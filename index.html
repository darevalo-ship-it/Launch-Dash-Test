<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="refresh" content="1800">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Launch Intelligence Hub - Thrive Causemetics</title>
  <style>
    :root {
      --tc-teal: #3A9E98;
      --tc-teal-dark: #1F6E6A;
      --tc-teal-light: #E6F4F3;
      --tc-navy: #1C2B3A;
      --tc-gold: #C9A84C;
      --bg: #F4F6F8;
      --card: #FFFFFF;
      --text: #1C2B3A;
      --muted: #6B7A8D;
      --border: #E2E8EF;
      --positive: #22A06B;
      --r: 12px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--text); }

    .hdr {
      background:linear-gradient(135deg, var(--tc-navy) 0%, var(--tc-teal-dark) 100%);
      color:#fff; padding:28px 36px;
    }
    .hdr h1 { font-size:22px; font-weight:700; letter-spacing:.3px; }
    .hdr p  { font-size:13px; opacity:.7; margin-top:4px; }
    .hdr-meta { display:flex; align-items:center; gap:12px; margin-top:16px; flex-wrap:wrap; }
    .stat-pill {
      background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.2);
      border-radius:20px; padding:5px 14px; font-size:12px; font-weight:500;
    }
    .stat-pill.green { background:rgba(34,160,107,.25); border-color:rgba(34,160,107,.5); }

    .main { max-width:1200px; margin:0 auto; padding:32px 24px; }

    .section-title {
      font-size:11px; font-weight:700; letter-spacing:1.2px; text-transform:uppercase;
      color:var(--muted); margin-bottom:16px; padding-bottom:8px;
      border-bottom:1px solid var(--border);
    }

    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:16px; margin-bottom:40px; }

    .card {
      background:var(--card); border-radius:var(--r); border:1px solid var(--border);
      padding:20px; display:flex; flex-direction:column; gap:12px;
      transition:box-shadow .15s, transform .15s;
      text-decoration:none; color:inherit; position:relative; overflow:hidden;
    }
    .card:hover { box-shadow:0 4px 20px rgba(28,43,58,.1); transform:translateY(-1px); }
    .card.live     { border-left:4px solid var(--tc-teal); }
    .card.upcoming { border-left:4px solid var(--border); }
    .card.upcoming .card-action { display:none; }

    .card-accent {
      position:absolute; top:0; right:0; width:80px; height:80px;
      border-radius:0 var(--r) 0 80px; opacity:.06;
    }
    .card.live .card-accent     { background:var(--tc-teal); }
    .card.upcoming .card-accent { background:var(--muted); }

    .card-top  { display:flex; justify-content:space-between; align-items:flex-start; }
    .card-name { font-size:15px; font-weight:700; line-height:1.3; flex:1; padding-right:8px; }
    .badge {
      font-size:10px; font-weight:700; letter-spacing:.6px; text-transform:uppercase;
      border-radius:20px; padding:3px 10px; white-space:nowrap;
    }
    .badge.live     { background:rgba(34,160,107,.12); color:#15794E; border:1px solid rgba(34,160,107,.3); }
    .badge.upcoming { background:rgba(107,122,141,.1);  color:var(--muted); border:1px solid var(--border); }
    .badge.soon     { background:rgba(245,158,11,.12);  color:#B45309; border:1px solid rgba(245,158,11,.3); }

    .card-dates { display:flex; gap:16px; flex-wrap:wrap; }
    .date-item  { font-size:12px; color:var(--muted); }
    .date-item strong { color:var(--text); font-weight:600; display:block; font-size:13px; }

    .card-kpis { display:flex; gap:10px; flex-wrap:wrap; }
    .kpi-chip {
      background:var(--tc-teal-light); border-radius:8px; padding:6px 12px;
      font-size:12px; color:var(--tc-teal-dark); font-weight:600;
    }
    .kpi-chip.gold    { background:rgba(201,168,76,.12); color:#7A5C00; }
    .kpi-chip.loading { background:var(--border); color:var(--muted); animation:fade 1.5s ease-in-out infinite; }
    @keyframes fade { 0%,100%{opacity:1} 50%{opacity:.45} }

    .card-action {
      display:inline-flex; align-items:center; gap:6px; margin-top:4px;
      background:var(--tc-teal); color:#fff; border-radius:8px;
      padding:8px 16px; font-size:12px; font-weight:600;
      text-decoration:none; transition:background .15s; align-self:flex-start;
    }
    .card-action:hover { background:var(--tc-teal-dark); }

    .upcoming-note { font-size:12px; color:var(--muted); font-style:italic; margin-top:2px; }
    .footer { text-align:center; padding:24px; font-size:11px; color:var(--muted); border-top:1px solid var(--border); }

    @media(max-width:600px) {
      .grid { grid-template-columns:1fr; }
      .hdr  { padding:20px; }
      .main { padding:20px 16px; }
    }
  </style>
</head>
<body>

<div class="hdr">
  <h1>&#128640; Launch Intelligence Hub</h1>
  <p>Thrive Causemetics &nbsp;&middot;&nbsp; Live dashboards for every product launch</p>
  <div class="hdr-meta" id="hdr-meta"></div>
</div>

<div class="main">

  <div class="section-title">Live Launches</div>
  <div class="grid" id="live-grid"></div>

  <div class="section-title">Upcoming Launches</div>
  <div class="grid" id="upcoming-grid"></div>
</div>

<div class="footer">Thrive Causemetics Launch Intelligence Hub &mdash; Data: Snowflake DAASITY_DB &middot; <a href="https://github.com/thrivecausemetics/glowing-launch-pad" style="color:var(--tc-teal);text-decoration:none;">glowing-launch-pad</a></div>

<script src="data.js"></script>
<script>
  const DD = window.DASHBOARD_DATA, META = DD.meta;
  const RET = META.retentionDays || 122;
  const db = (a, b) => Math.floor((new Date(b + 'T00:00:00') - new Date(a + 'T00:00:00')) / 86400000);
  const state = l => db(l.launchDate, META.dataCutoff) > RET ? 'archived'
    : (l.summary && l.dailySales && l.dailySales.length) ? 'live'
    : db(l.launchDate, META.generatedAt) >= 0 ? 'pending' : 'upcoming';
  const fmtDate = iso => new Date(iso + 'T00:00:00').toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
  const fmtDay  = iso => new Date(iso + 'T00:00:00').toLocaleDateString('en-US', {month:'short', day:'numeric'});
  const ptpColor = v => v == null ? '#9CA3AF' : v >= 100 ? '#22A06B' : v >= 85 ? '#F59E0B' : '#EF4444';

  const live = DD.launches.filter(l => state(l) === 'live');
  const pending = DD.launches.filter(l => state(l) === 'pending');

  document.getElementById('hdr-meta').innerHTML = [
    `<span class="stat-pill green">${live.length} Live Launch${live.length !== 1 ? 'es' : ''}</span>`,
    pending.length ? `<span class="stat-pill">${pending.length} Launched · Data Pending</span>` : '',
    `<span class="stat-pill">Data through ${fmtDate(META.dataCutoff)} · ${META.sourceDb || 'DAASITY_DB'}</span>`,
  ].join('');

  document.getElementById('live-grid').innerHTML = live.map(l => {
    const s = l.summary, ptp = s.pctToPlanUnits;
    const day = Math.max(1, db(l.launchDate, META.dataCutoff) + 1);
    return `<a class="card live" href="launch.html?id=${l.launchId}" style="border-left-color:${l.accent || 'var(--tc-teal)'}">
      <div class="card-accent" style="background:${l.accent || 'var(--tc-teal)'}"></div>
      <div class="card-top">
        <div class="card-name">${l.name}<br><span style="font-size:12px;font-weight:400;color:var(--muted)">${l.subtitle || ''}</span></div>
        <span class="badge live">Live</span>
      </div>
      <div class="card-dates">
        <div class="date-item"><strong>${fmtDate(l.launchDate)}</strong>Launch Date</div>
        <div class="date-item"><strong>Day ${day}</strong>As of ${fmtDay(META.dataCutoff)}</div>
      </div>
      <div class="card-kpis">
        <span class="kpi-chip">$${(s.netSales / 1000).toFixed(0)}k Net Sales</span>
        <span class="kpi-chip">${s.units.toLocaleString()} Units</span>
        <span class="kpi-chip gold" style="color:${ptpColor(ptp)}">${ptp != null ? ptp.toFixed(1) + '% to Plan' : '—'}</span>
      </div>
      <span class="card-action" style="background:${l.accent || 'var(--tc-teal)'}">View Dashboard &rarr;</span>
    </a>`;
  }).join('') + pending.map(l => `
    <a class="card live" href="launch.html?id=${l.launchId}" style="border-left-color:${l.accent || 'var(--border)'}">
      <div class="card-accent" style="background:${l.accent || 'var(--muted)'}"></div>
      <div class="card-top">
        <div class="card-name">${l.name}<br><span style="font-size:12px;font-weight:400;color:var(--muted)">${l.subtitle || ''}</span></div>
        <span class="badge soon">Live · Data Pending</span>
      </div>
      <div class="card-dates">
        <div class="date-item"><strong>${fmtDate(l.launchDate)}</strong>Launch Date</div>
      </div>
      <p class="upcoming-note">Sales data appears after the next automated refresh${l.skusPending ? ' (SKUs pending in config/launches.json)' : ''}</p>
      <span class="card-action">View Dashboard &rarr;</span>
    </a>`).join('');

  const upcoming = (DD.upcoming || []).filter(u =>
    db(META.generatedAt, u.launchDate) >= 0 &&
    !(u.trackedId && DD.launches.some(l => l.launchId === u.trackedId)));
  document.getElementById('upcoming-grid').innerHTML = upcoming.map(u => {
    const near = db(META.generatedAt, u.launchDate) <= 21;
    return `<div class="card upcoming">
      <div class="card-accent"></div>
      <div class="card-top"><div class="card-name">${u.name}</div><span class="badge ${near ? 'soon' : 'upcoming'}">${fmtDay(u.launchDate)}</span></div>
      <div class="card-dates">
        <div class="date-item"><strong>${fmtDate(u.launchDate)}</strong>Launch Date</div>
        ${u.internalDate ? `<div class="date-item"><strong>${fmtDate(u.internalDate)}</strong>Internal</div>` : ''}
      </div>
      <p class="upcoming-note">Dashboard will be created once live</p>
    </div>`;
  }).join('') || '<p class="upcoming-note">No upcoming launches configured.</p>';
</script>
</body>
</html>
